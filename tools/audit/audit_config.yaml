# =============================================================================
# Vestige Engine — Audit Configuration
# =============================================================================
# This file configures the automated audit tool for the Vestige 3D engine.
# For other projects, copy this file and adjust the values.
# Run: python3 tools/audit/audit.py
# =============================================================================

project:
  name: "Vestige"
  root: "../.."
  language: "cpp"
  source_dirs: ["engine/", "app/", "tests/"]
  shader_dirs: ["assets/shaders/"]
  shader_glob: "*.glsl"
  source_extensions: [".cpp", ".h"]
  exclude_dirs: ["external/", "build/", ".git/", ".claude/", ".cache/"]
  exclude_file_patterns: []

# -- Tier 1: Build & Tests ---------------------------------------------------
build:
  system: "cmake"
  build_dir: "build"
  configure_cmd: null  # Set to "cmake -B build" if build dir doesn't exist
  build_cmd: "cmake --build build 2>&1"
  warning_regex: "warning:|error:"
  test_cmd: "cd build && ctest --output-on-failure 2>&1"
  sanitizer:
    enabled: false
    configure_cmd: >-
      cmake -B build-asan -DCMAKE_BUILD_TYPE=Debug
      -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
    build_cmd: "cmake --build build-asan"
    test_cmd: "cd build-asan && ctest --output-on-failure"

# -- Tier 1: Static Analysis -------------------------------------------------
static_analysis:
  cppcheck:
    enabled: true
    binary: null  # Auto-detected
    args: >-
      --enable=all --std=c++17
      --suppress=missingIncludeSystem
      --suppress=unusedFunction
      -I engine/ -I external/
    output_format: "xml"
    targets: ["engine/", "app/", "tests/"]
    timeout: 600
  clang_tidy:
    enabled: true
    binary: null  # Auto-detected
    compile_commands: "build/compile_commands.json"
    checks: "bugprone-*,performance-*,modernize-*,readability-*,cppcoreguidelines-*"
    fallback_flags: "-std=c++17 -I engine/ -I external/"
    max_files: 50
    timeout: 600

# -- Tier 2: Pattern Scanning ------------------------------------------------
patterns:
  memory_safety:
    - name: "raw_new"
      pattern: "=\\s*new\\s+\\w+"
      file_glob: "*.cpp,*.h"
      severity: "high"
      description: "Raw new — should use smart pointers"
      exclude_pattern: "placement new|nothrow|JPH::|tinygltf|stb_|dr_|make_unique|make_shared|new Q\\w+\\(|new Q\\w+\\s*\\{|QVBoxLayout|QHBoxLayout|QGridLayout|QFormLayout|QAction|QMenu|QLabel|QWidget"
      skip_comments: true
    - name: "raw_delete"
      pattern: "\\bdelete\\s+\\w+"
      file_glob: "*.cpp,*.h"
      severity: "high"
      description: "Raw delete — should use smart pointers"
      exclude_pattern: "JPH::|tinygltf|stb_|dr_"
      skip_comments: true
    - name: "null_macro"
      pattern: "\\bNULL\\b"
      file_glob: "*.cpp,*.h"
      severity: "low"
      description: "NULL macro — use nullptr"
      skip_comments: true
    - name: "unsafe_c_string"
      pattern: "\\b(strcpy|strcat|sprintf)\\s*\\("
      file_glob: "*.cpp,*.h"
      severity: "high"
      description: "Unsafe C string function"
      skip_comments: true
    - name: "using_namespace_header"
      pattern: "using namespace"
      file_glob: "*.h"
      severity: "medium"
      description: "using namespace in header — namespace pollution"
      skip_comments: true
    - name: "c_style_cast"
      pattern: "\\(\\s*(int|float|double|char|unsigned|long|short|size_t|uint\\d+_t|int\\d+_t)\\s*\\*?\\s*\\)"
      file_glob: "*.cpp,*.h"
      severity: "medium"
      description: "C-style cast — use static_cast/reinterpret_cast"
      exclude_pattern: "\\(void\\)|sizeof\\s*\\(|static_cast|reinterpret_cast|const_cast|dynamic_cast"
      skip_comments: true

  security:
    - name: "path_traversal"
      pattern: "(QDir|QFile|std::ofstream|std::ifstream|fopen).*\\+.*(?:Id|Name|Path|name|path|id|file|dir)"
      file_glob: "*.cpp"
      severity: "high"
      description: "Path concatenation with user-controlled input — verify sanitization"
      skip_comments: true
    - name: "command_injection"
      pattern: "(?:system|popen|exec[lv]p?)\\s*\\(.*\\+|QProcess.*start.*\\+|\"(?:cd|rm|mv|cp|sh|bash)\\s.*\\+"
      file_glob: "*.cpp"
      severity: "high"
      description: "Shell command constructed from string concatenation — command injection risk"
      skip_comments: true
    - name: "missing_fd_cloexec"
      pattern: "\\b(?:forkpty|fork)\\s*\\("
      file_glob: "*.cpp"
      severity: "medium"
      description: "fork/forkpty — verify FD_CLOEXEC set and FDs closed in child (CWE-403)"
      skip_comments: true
    - name: "decompression_bomb"
      pattern: "\\b(?:qUncompress|inflate|decompress|gunzip|unzip|LZ4_decompress)\\b"
      file_glob: "*.cpp"
      severity: "high"
      description: "Decompression without size limit — potential decompression bomb (CWE-409)"
      skip_comments: true
    - name: "socket_permissions"
      pattern: "\\b(?:listen|bind)\\s*\\(.*(?:Unix|Local|AF_UNIX)"
      file_glob: "*.cpp"
      severity: "medium"
      description: "Unix socket — verify restrictive file permissions after bind/listen"
      skip_comments: true
    - name: "unsafe_deserialization"
      pattern: "\\b(?:luaL_dofile|luaL_loadfile|luaL_loadbuffer|pickle\\.load|yaml\\.load|readObjectFromFile)\\b"
      file_glob: "*.cpp,*.py"
      severity: "high"
      description: "Loading untrusted data — verify input validation / sandbox (CWE-502)"
      skip_comments: true
    - name: "unbounded_buffer"
      pattern: "(?:push_back|append|\\+=).*(?:readAll|recv|read\\(|fread)(?!.*(?:max|limit|cap|size_check|MAX))"
      file_glob: "*.cpp"
      severity: "medium"
      description: "Unbounded buffer growth from I/O — verify size limits"
      skip_comments: true
    - name: "predictable_temp"
      pattern: "(?:/tmp/|/var/tmp/).*\\+|tmpnam\\(|tempnam\\(|mktemp\\("
      file_glob: "*.cpp"
      severity: "medium"
      description: "Predictable temporary file path — use mkstemp/QTemporaryFile (CWE-377)"
      skip_comments: true
    - name: "missing_null_check"
      pattern: "->\\w+.*=.*(?:dynamic_cast|find|lookup|get).*(?:nullptr|NULL|null)"
      file_glob: "*.cpp"
      severity: "medium"
      description: "Dereference after potentially-null operation — verify null check"
      exclude_pattern: "if\\s*\\(|\\?|assert"
      skip_comments: true

  opengl_state:
    - name: "global_gl_state"
      pattern: "\\b(glClipControl|glDepthFunc|glCullFace|glPolygonMode)\\b"
      file_glob: "*.cpp,*.h"
      severity: "medium"
      description: "Global GL state change — verify restore"
    - name: "framebuffer_no_check"
      pattern: "glBindFramebuffer"
      file_glob: "*.cpp,*.h"
      severity: "medium"
      description: "Framebuffer bind — verify completeness check nearby"

  performance:
    - name: "std_endl"
      pattern: "std::endl"
      file_glob: "*.cpp,*.h"
      severity: "low"
      description: "std::endl flushes stream — use '\\n'"
    - name: "shared_ptr"
      pattern: "std::shared_ptr"
      file_glob: "*.cpp,*.h"
      severity: "low"
      description: "shared_ptr — verify unique_ptr not sufficient"
    - name: "push_back_loop"
      pattern: "push_back\\("
      file_glob: "*.cpp"
      severity: "low"
      description: "push_back — verify not in hot render/update loop without reserve"

  code_quality:
    - name: "todo_fixme"
      pattern: "\\b(TODO|FIXME|HACK|WORKAROUND|XXX)\\b"
      file_glob: "*.cpp,*.h"
      severity: "info"
      description: "Deferred work marker"
    - name: "warning_suppression"
      pattern: "(NOLINT|#pragma\\s+warning)"
      file_glob: "*.cpp,*.h"
      severity: "low"
      description: "Warning suppression — verify justification"
    - name: "empty_catch"
      pattern: "catch\\s*\\([^)]*\\)\\s*\\{\\s*\\}"
      file_glob: "*.cpp,*.h"
      severity: "medium"
      description: "Empty catch block — silently swallowed error"
    - name: "dead_code_markers"
      pattern: "//\\s*(unused|removed|old|deprecated)"
      file_glob: "*.cpp,*.h"
      severity: "low"
      description: "Dead code marker — consider removing"

  shader:
    - name: "shader_discard"
      pattern: "\\bdiscard\\b"
      file_glob: "*.glsl"
      severity: "info"
      description: "Fragment discard — performance concern on some GPUs"
    - name: "unbounded_loop"
      pattern: "while\\s*\\(\\s*true\\s*\\)"
      file_glob: "*.glsl"
      severity: "high"
      description: "Unbounded loop — potential GPU hang"

# -- Tier 3: Changed File Analysis -------------------------------------------
changes:
  base_ref: "HEAD~1"

# -- Tier 4: Data Collection -------------------------------------------------
tier4:
  gpu_resource_pattern: "GLuint\\s+m_"
  event_subscribe_pattern: "subscribe<"
  event_unsubscribe_pattern: "unsubscribe"
  complexity_threshold: 500
  # Code duplication detection
  duplication:
    enabled: true
    min_lines: 5         # Minimum block size in lines
    min_tokens: 50       # Minimum block size in tokens
    normalize_ids: true  # Enable Type-2 (renamed variable) detection
    max_findings: 50
  # Refactoring opportunity analysis
  refactoring:
    enabled: true
    max_params: 5              # Long parameter list threshold
    max_functions_per_file: 15 # God file threshold
    max_case_labels: 7         # Large switch threshold
    max_elif_chain: 5          # Long else-if chain threshold
    max_nesting_depth: 4       # Deep nesting threshold
    max_findings: 50

# -- Tier 5: Online Research --------------------------------------------------
research:
  enabled: true
  cache_dir: ".audit_cache"
  cache_ttl_days: 7
  max_results_per_query: 3
  topics:
    - query: "site:nvd.nist.gov GLFW vulnerability"
    - query: "site:nvd.nist.gov FreeType vulnerability 2024 2025"
    - query: "site:nvd.nist.gov OpenAL vulnerability"
    - query: "site:github.com/syoyo/tinygltf security issues"
    - query: "AMD Mesa RADV OpenGL bug report 2025"
    - query: "OpenGL best practices performance GPU batching instancing"
    - query: "XPBD cloth simulation stability convergence improvements"
    - query: "cppcheck false positive returnDanglingLifetime unique_ptr move"
  custom_queries: []
  # NVD (National Vulnerability Database) direct API queries
  nvd:
    enabled: true
    api_key: "<REDACTED-rotated-2026-04-13>"  # Pending activation (up to 7 days from 2026-04-11)
    api_key_env: "NVD_API_KEY"  # Fallback: check this env var if api_key is null
    dependencies:
      - "GLFW"
      - "FreeType"
      - "OpenAL"
      - "nlohmann json"
      - "stb image"
  # Auto-detected improvement research — scans codebase for technologies
  # and generates queries for better approaches / new features
  improvements:
    enabled: true
    max_queries: 10  # cap to avoid excessive search time

# -- Report Settings ----------------------------------------------------------
report:
  output_path: "docs/AUTOMATED_AUDIT_REPORT.md"
  max_findings_per_category: 100
  include_json_blocks: true
  include_token_estimate: true

# -- Which tiers to run (override with --tiers CLI flag) ----------------------
tiers: [1, 2, 3, 4, 5]

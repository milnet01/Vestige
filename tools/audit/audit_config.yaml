# =============================================================================
# Vestige Engine — Audit Configuration
# =============================================================================
# This file configures the automated audit tool for the Vestige 3D engine.
# For other projects, copy this file and adjust the values.
# Run: python3 tools/audit/audit.py
# =============================================================================

project:
  name: "Vestige"
  root: "../.."
  language: "cpp"
  source_dirs: ["engine/", "app/", "tests/"]
  shader_dirs: ["assets/shaders/"]
  shader_glob: "*.glsl"
  source_extensions: [".cpp", ".h"]
  exclude_dirs: ["external/", "build/", ".git/", ".claude/", ".cache/"]
  exclude_file_patterns: []

# -- Tier 1: Build & Tests ---------------------------------------------------
build:
  system: "cmake"
  build_dir: "build"
  configure_cmd: null  # Set to "cmake -B build" if build dir doesn't exist
  build_cmd: "cmake --build build 2>&1"
  warning_regex: "warning:|error:"
  # -j $(nproc): run tests in parallel. Serial execution on 1768 tests
  # reaches ~9-10 min on GH free runners and trips the 600 s internal
  # tier1 subprocess timeout. Test fixtures are parallel-safe (see
  # test_scene_serializer.cpp / test_file_menu.cpp using per-process
  # tmpdirs).
  test_cmd: "cd build && ctest --output-on-failure -j $(nproc) 2>&1"
  sanitizer:
    enabled: false
    configure_cmd: >-
      cmake -B build-asan -DCMAKE_BUILD_TYPE=Debug
      -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
    build_cmd: "cmake --build build-asan"
    test_cmd: "cd build-asan && ctest --output-on-failure"

# -- Tier 1: Static Analysis -------------------------------------------------
static_analysis:
  cppcheck:
    enabled: true
    binary: null  # Auto-detected
    # --inline-suppr: honour `// cppcheck-suppress <rule>` comments in source.
    # Without this, inline-suppressed false positives are re-reported every
    # audit. Current FP sites (verified, see AUDIT.md):
    #   engine/scene/entity.cpp (return ptr after std::move) — returnDanglingLifetime
    #   engine/formula/node_graph.cpp (post-resize access) — containerOutOfBounds
    #   tests/test_command_history.cpp:244-246 — see AUDIT.md
    args: >-
      --enable=all --std=c++17 --inline-suppr
      --suppress=missingIncludeSystem
      --suppress=unusedFunction
      -I engine/ -I external/
    output_format: "xml"
    targets: ["engine/", "app/", "tests/"]
    timeout: 600
  clang_tidy:
    enabled: true
    binary: null  # Auto-detected
    compile_commands: "build/compile_commands.json"
    # Five checks deliberately excluded — see lib/config.py for the
    # full rationale per exclusion. Every other check in the broad
    # categories below stays active.
    checks: >-
      bugprone-*,performance-*,modernize-*,readability-*,cppcoreguidelines-*,
      -modernize-use-trailing-return-type,
      -modernize-return-braced-init-list,
      -readability-uppercase-literal-suffix,
      -bugprone-easily-swappable-parameters,
      -readability-braces-around-statements
    fallback_flags: "-std=c++17 -I engine/ -I external/"
    max_files: 50
    # 1200 s (was 600) — legitimate bump per CLAUDE.md rule #10.
    # 50 files × 5 heavy check categories (bugprone-*, performance-*,
    # modernize-*, readability-*, cppcoreguidelines-*) takes ~3 min
    # locally but ~10+ min on GH free runners. 600 s was tripping mid-run
    # in CI (run 24394450313). Bump matches the real cost of the work;
    # subsequent warm-cache runs should still finish well under this.
    timeout: 1200

# -- Tier 2: Pattern Scanning ------------------------------------------------
patterns:
  memory_safety:
    # AUDIT.md §M21 / FIXPLAN J7: tightened. The prior exclude
    # `new Q\\w+\\(` matched ordinary types starting with 'Q' (e.g.
    # `new Quad()`) as if they were Qt widgets. Restrict to the actual
    # Qt widget classes we expect to see. For non-Qt projects this
    # exclude is effectively inert.
    - name: "raw_new"
      pattern: "=\\s*new\\s+\\w+"
      file_glob: "*.cpp,*.h"
      severity: "high"
      description: "Raw new — should use smart pointers"
      exclude_pattern: "placement new|nothrow|JPH::|tinygltf|stb_|dr_|make_unique|make_shared|\\bnew Q(Widget|Action|Menu|Label|VBoxLayout|HBoxLayout|GridLayout|FormLayout|PushButton|LineEdit|CheckBox|ComboBox|SpinBox|Slider|Dialog)\\b"
      skip_comments: true
    - name: "raw_delete"
      pattern: "\\bdelete\\s+\\w+"
      file_glob: "*.cpp,*.h"
      severity: "high"
      description: "Raw delete — should use smart pointers"
      exclude_pattern: "JPH::|tinygltf|stb_|dr_"
      skip_comments: true
    # AUDIT.md §M21 / FIXPLAN J7: reject #define FOO_NULL ... lines.
    # The `\\bNULL\\b` match was firing on constant names ending in
    # _NULL (e.g. `#define FOO_NULL 0`) and on TLS config tokens.
    - name: "null_macro"
      pattern: "\\bNULL\\b"
      file_glob: "*.cpp,*.h"
      severity: "low"
      description: "NULL macro — use nullptr"
      exclude_pattern: "^\\s*#define\\s+\\w*NULL\\w*|_NULL\\b"
      skip_comments: true
    - name: "unsafe_c_string"
      pattern: "\\b(strcpy|strcat|sprintf)\\s*\\("
      file_glob: "*.cpp,*.h"
      severity: "high"
      description: "Unsafe C string function"
      skip_comments: true
    - name: "using_namespace_header"
      pattern: "using namespace"
      file_glob: "*.h"
      severity: "medium"
      description: "using namespace in header — namespace pollution"
      skip_comments: true
    # audit 2.14.1: the cast must be *applied* to something — require the
    # closing `)` to be followed by an identifier, nested `(`, unary
    # operator, or signed-number prefix. Without this, two large
    # false-positive classes land in the report:
    #   1. Parameter decls with commented-out names, e.g.
    #      `void update(float /*deltaTime*/)` — `skip_comments` strips
    #      the comment first, leaving `(float )` which the old pattern
    #      matched as a cast.
    #   2. Function-pointer type syntax, e.g.
    #      `using EasingFunc = float (*)(float);` — the trailing
    #      `(float)` matched as a cast.
    # Real casts are always followed by the operand, so keying the
    # pattern on operand-start kills both FP classes without losing
    # genuine `(int)x` / `(float)-1` / `(int)(expr)` signal.
    - name: "c_style_cast"
      pattern: "\\(\\s*(int|float|double|char|unsigned|long|short|size_t|uint\\d+_t|int\\d+_t)\\s*\\*?\\s*\\)\\s*[A-Za-z_(+\\-!~]"
      file_glob: "*.cpp,*.h"
      severity: "medium"
      description: "C-style cast — use static_cast/reinterpret_cast"
      exclude_pattern: "\\(void\\)|sizeof\\s*\\(|static_cast|reinterpret_cast|const_cast|dynamic_cast"
      skip_comments: true

  security:
    - name: "path_traversal"
      pattern: "(QDir|QFile|std::ofstream|std::ifstream|fopen).*\\+.*(?:Id|Name|Path|name|path|id|file|dir)"
      file_glob: "*.cpp"
      severity: "high"
      description: "Path concatenation with user-controlled input — verify sanitization"
      skip_comments: true
    - name: "command_injection"
      pattern: "(?:system|popen|exec[lv]p?)\\s*\\(.*\\+|QProcess.*start.*\\+|\"(?:cd|rm|mv|cp|sh|bash)\\s.*\\+"
      file_glob: "*.cpp"
      severity: "high"
      description: "Shell command constructed from string concatenation — command injection risk"
      skip_comments: true
    - name: "missing_fd_cloexec"
      pattern: "\\b(?:forkpty|fork)\\s*\\("
      file_glob: "*.cpp"
      severity: "medium"
      description: "fork/forkpty — verify FD_CLOEXEC set and FDs closed in child (CWE-403)"
      skip_comments: true
    - name: "decompression_bomb"
      pattern: "\\b(?:qUncompress|inflate|decompress|gunzip|unzip|LZ4_decompress)\\b"
      file_glob: "*.cpp"
      severity: "high"
      description: "Decompression without size limit — potential decompression bomb (CWE-409)"
      skip_comments: true
    - name: "socket_permissions"
      pattern: "\\b(?:listen|bind)\\s*\\(.*(?:Unix|Local|AF_UNIX)"
      file_glob: "*.cpp"
      severity: "medium"
      description: "Unix socket — verify restrictive file permissions after bind/listen"
      skip_comments: true
    - name: "unsafe_deserialization"
      pattern: "\\b(?:luaL_dofile|luaL_loadfile|luaL_loadbuffer|pickle\\.load|yaml\\.load|readObjectFromFile)\\b"
      file_glob: "*.cpp,*.py"
      severity: "high"
      description: "Loading untrusted data — verify input validation / sandbox (CWE-502)"
      skip_comments: true
    - name: "unbounded_buffer"
      pattern: "(?:push_back|append|\\+=).*(?:readAll|recv|read\\(|fread)(?!.*(?:max|limit|cap|size_check|MAX))"
      file_glob: "*.cpp"
      severity: "medium"
      description: "Unbounded buffer growth from I/O — verify size limits"
      skip_comments: true
    # AUDIT.md §M21 / FIXPLAN J7: anchor mktemp/tmpnam/tempnam with \b
    # so wrappers like `my_mktemp_wrapper(` don't false-positive.
    - name: "predictable_temp"
      pattern: "(?:/tmp/|/var/tmp/).*\\+|\\btmpnam\\(|\\btempnam\\(|\\bmktemp\\("
      file_glob: "*.cpp"
      severity: "medium"
      description: "Predictable temporary file path — use mkstemp/QTemporaryFile (CWE-377)"
      skip_comments: true
    - name: "missing_null_check"
      pattern: "->\\w+.*=.*(?:dynamic_cast|find|lookup|get).*(?:nullptr|NULL|null)"
      file_glob: "*.cpp"
      severity: "medium"
      description: "Dereference after potentially-null operation — verify null check"
      exclude_pattern: "if\\s*\\(|\\?|assert"
      skip_comments: true

  opengl_state:
    - name: "global_gl_state"
      pattern: "\\b(glClipControl|glDepthFunc|glCullFace|glPolygonMode)\\b"
      file_glob: "*.cpp,*.h"
      severity: "medium"
      description: "Global GL state change — verify restore"
    - name: "framebuffer_no_check"
      pattern: "glBindFramebuffer"
      file_glob: "*.cpp,*.h"
      severity: "medium"
      description: "Framebuffer bind — verify completeness check nearby"

  performance:
    - name: "std_endl"
      pattern: "std::endl"
      file_glob: "*.cpp,*.h"
      severity: "low"
      description: "std::endl flushes stream — use '\\n'"
    - name: "shared_ptr"
      pattern: "std::shared_ptr"
      file_glob: "*.cpp,*.h"
      severity: "low"
      description: "shared_ptr — verify unique_ptr not sufficient"
    - name: "push_back_loop"
      pattern: "push_back\\("
      file_glob: "*.cpp"
      severity: "low"
      description: "push_back — verify not in hot render/update loop without reserve"

  code_quality:
    - name: "todo_fixme"
      pattern: "\\b(TODO|FIXME|HACK|WORKAROUND|XXX)\\b"
      file_glob: "*.cpp,*.h"
      severity: "info"
      description: "Deferred work marker"
    - name: "warning_suppression"
      pattern: "(NOLINT|#pragma\\s+warning)"
      file_glob: "*.cpp,*.h"
      severity: "low"
      description: "Warning suppression — verify justification"
    - name: "empty_catch"
      pattern: "catch\\s*\\([^)]*\\)\\s*\\{\\s*\\}"
      file_glob: "*.cpp,*.h"
      severity: "medium"
      description: "Empty catch block — silently swallowed error"
    - name: "dead_code_markers"
      pattern: "//\\s*(unused|removed|old|deprecated)"
      file_glob: "*.cpp,*.h"
      severity: "low"
      description: "Dead code marker — consider removing"

  shader:
    - name: "shader_discard"
      pattern: "\\bdiscard\\b"
      file_glob: "*.glsl"
      severity: "info"
      description: "Fragment discard — performance concern on some GPUs"
    - name: "unbounded_loop"
      pattern: "while\\s*\\(\\s*true\\s*\\)"
      file_glob: "*.glsl"
      severity: "high"
      description: "Unbounded loop — potential GPU hang"
    # Phase 9B GPU cloth pipeline: std430 array stride for vec3 is 16 B on
    # some drivers (Mesa AMD has bitten us), not 12 B. SSBO arrays must use
    # vec4 layout with the w channel as padding / inverse mass. Flag vec3[]
    # in compute shaders so the same pitfall doesn't sneak back in via a
    # follow-up commit.
    - name: "ssbo_vec3_array"
      pattern: "\\bvec3\\s+\\w+\\s*\\[\\s*\\]"
      file_glob: "*.comp.glsl"
      severity: "medium"
      description: "vec3[] in compute shader — std430 stride is 16 B; use vec4 with w padding"

# -- Tier 3: Changed File Analysis -------------------------------------------
changes:
  base_ref: "HEAD~1"

# -- Tier 4: Data Collection -------------------------------------------------
tier4:
  gpu_resource_pattern: "GLuint\\s+m_"
  event_subscribe_pattern: "subscribe<"
  event_unsubscribe_pattern: "unsubscribe"
  complexity_threshold: 500
  # Code duplication detection
  duplication:
    enabled: true
    min_lines: 5         # Minimum block size in lines
    min_tokens: 50       # Minimum block size in tokens
    normalize_ids: true  # Enable Type-2 (renamed variable) detection
    max_findings: 50
  # Refactoring opportunity analysis
  refactoring:
    enabled: true
    max_params: 5              # Long parameter list threshold
    max_functions_per_file: 15 # God file threshold
    max_case_labels: 7         # Large switch threshold
    max_elif_chain: 5          # Long else-if chain threshold
    max_nesting_depth: 4       # Deep nesting threshold
    max_findings: 50
  # Cognitive complexity analysis (SonarSource algorithm)
  cognitive:
    enabled: true
    threshold: 15              # Functions scoring above this are flagged
    max_findings: 50
  # Per-frame heap-alloc detection (audit 2.14.0 — idea #18). Walks
  # functions whose name matches one of `function_patterns` (substring,
  # case-insensitive) and flags allocations inside them. Loop-nested
  # allocations are MEDIUM; non-loop allocations are LOW.
  per_frame_alloc:
    enabled: true
    function_patterns:
      - render
      - draw
      - update
      - onframe
      - onupdate
      - tick
    max_findings: 50
  # Dead public-API detection (audit 2.14.0 — idea #25). Lists public
  # class / free-function declarations from headers and flags those with
  # zero external callers. Severity LOW — pure cleanup hint.
  dead_public_api:
    enabled: true
    # Extra symbol names to skip on top of the built-in blocklist
    # (init/run/begin/end/size/data/etc).
    name_blocklist: []
    max_findings: 50
  # DRY token-shingle similarity (audit 2.14.0 — idea #28). Hashes
  # K-token windows in each file and reports file pairs whose Jaccard
  # similarity exceeds `similarity_threshold`. Complements the
  # line-based duplication scan above; catches reflowed near-duplicates.
  token_shingle:
    enabled: true
    shingle_size: 7
    similarity_threshold: 0.6
    min_tokens: 80
    max_findings: 30

# -- Tier 5: Online Research --------------------------------------------------
research:
  enabled: true
  cache_dir: ".audit_cache"
  cache_ttl_days: 7
  max_results_per_query: 3
  topics:
    - query: "site:nvd.nist.gov GLFW vulnerability"
    - query: "site:nvd.nist.gov FreeType vulnerability 2024 2025"
    - query: "site:nvd.nist.gov OpenAL vulnerability"
    - query: "site:github.com/syoyo/tinygltf security issues"
    - query: "AMD Mesa RADV OpenGL bug report 2025"
    - query: "OpenGL best practices performance GPU batching instancing"
    - query: "XPBD cloth simulation stability convergence improvements"
    - query: "cppcheck false positive returnDanglingLifetime unique_ptr move"
  custom_queries: []
  # NVD (National Vulnerability Database) direct API queries
  nvd:
    enabled: true
    # SECURITY: NEVER commit an API key here. Use the NVD_API_KEY env var.
    # The previous literal key committed in this file was rotated on 2026-04-13
    # per AUDIT.md §C2. Leaving `api_key: null` and relying on the env var is
    # the only supported configuration.
    api_key: null
    api_key_env: "NVD_API_KEY"  # Required: set this env var to use NVD rate limits
    # D6 (audit tool 2.3.0): each entry can be a bare string (name-only,
    # no version filtering) or a dict {name, version} — the version
    # form tags each returned CVE with `affects_pinned` so the report
    # highlights CVEs that actually hit the pinned version and
    # de-emphasises keyword-match noise. Versions below track
    # `external/CMakeLists.txt` FetchContent_Declare GIT_TAGs as of
    # 2026-04-14. Bump these in the same PR that bumps GIT_TAG.
    dependencies:
      - { name: "GLFW",           version: "3.4" }
      - { name: "FreeType",       version: "2.13.3" }    # GIT_TAG VER-2-13-3
      - { name: "OpenAL",         version: "1.24.1" }    # openal-soft
      - { name: "nlohmann json",  version: "3.12.0" }
      - { name: "JoltPhysics",    version: "5.2.0" }
      - { name: "Recast",         version: "1.6.0" }     # recastnavigation
      - { name: "tinygltf",       version: "2.9.4" }
      - { name: "googletest",     version: "1.15.2" }
      # stb_image is header-only with no published version — keep
      # legacy string form so a keyword search still runs.
      - "stb image"
  # Auto-detected improvement research — scans codebase for technologies
  # and generates queries for better approaches / new features
  improvements:
    enabled: true
    max_queries: 10  # cap to avoid excessive search time

# -- Report Settings ----------------------------------------------------------
report:
  output_path: "docs/AUTOMATED_AUDIT_REPORT.md"
  max_findings_per_category: 100
  include_json_blocks: true
  include_token_estimate: true
  # Agent Playbook — 5-phase instruction block rendered at the top of the
  # report, telling the downstream LLM consumer (e.g. a Claude Code session
  # handed this report) to follow Baseline → Verify → Cite → Approval Gate
  # → Implement+Test rather than jumping straight to fixes. Closes the
  # biggest rigour gap vs the manual-audit prompt. Set to false to skip.
  include_playbook: true
  # Minimum finding severity that requires user approval before the agent
  # applies a fix. One of: "critical", "high", "medium", "low", "info".
  # Findings below this bar may be auto-fixed (trivial / obvious). Default
  # "medium" mirrors the manual audit's approval threshold.
  approval_gate_threshold: "medium"

# -- Corroboration (D2, audit tool 2.4.0) ------------------------------------
# Cross-source corroboration layer. When two or more *independent* sources
# (e.g. cppcheck + tier-2 regex, or complexity + cognitive_complexity)
# flag the same (file, line), the finding is tagged `[CORROB]` and its
# severity is promoted by `promote_level` steps. Solo (uncorroborated)
# hits whose `pattern_name` appears in `demoted_patterns` are demoted to
# INFO — these are the known-noisy tier-2 patterns where one match in
# isolation is rarely actionable. Severity adjustments run BEFORE
# severity_overrides / suppressions so user choices still win.
corroboration:
  enabled: true
  promote_level: 1
  demoted_patterns:
    - "std_endl"
    - "push_back_loop"
    - "todo_fixme"
    - "dead_code_markers"
    - "shared_ptr"

# -- Tier 6 — Feature coverage sweep (D4, 2.6.0; D5 keyword map, 2.7.0) -----
# Flags engine subsystems (engine/<name>/) that have zero or very few test
# files referencing them. Purely heuristic — measures breadth of test
# coverage, not code line/branch coverage.
#
# subsystem_keywords (D5 / 2.7.0): per-subsystem extra filename prefixes
# that count as coverage. Necessary when feature-named tests don't
# include the production code directly (e.g. test_bloom.cpp mirrors
# renderer math without `#include "engine/renderer/..."` — listing
# `bloom` under `renderer:` makes it count as renderer coverage).
# Prefix matching: a test counts if its filename starts with
# `test_<keyword>`. Each test still counts at most once per subsystem
# regardless of how many signals it satisfies.
tier6:
  enabled: true
  engine_dir: "engine"          # relative path to subsystem dirs
  tests_dir: "tests"            # relative path to test source files
  thin_threshold: 3             # <3 tests → INFO "thin coverage", 0 → MEDIUM "no coverage"
  excluded_subsystems: []       # names to ignore on top of built-in "testing/"
  subsystem_keywords:
    audio:
      - lip_sync
    core:
      - event_bus
      - logger
      - memory_tracker
      - quality_manager
      - timer
      - system_registry
      - domain_systems
    profiler:
      - cpu_profiler
    renderer:
      - bloom
      - cascaded_shadow_map
      - color_grading
      - emissive_lighting
      - framebuffer
      - frustum_culling
      - hdr_pipeline
      - ibl
      - instanced_rendering
      - pbr_material
      - point_shadow_map
      - pom
      - shadow_map
      - ssao
      - taa
      - texture_filter
      - transparency
      - tangent_calc
      - skybox
      - text_rendering
    resource:
      - async_texture_loader
      - obj_loader
      - gltf_loader
    systems:
      - pressure_plate
      - system_registry
      - stasis_system
    ui:
      - file_menu
      - editor_viewers
    utils:
      - aabb
      - cubicspline
      - catmull_rom_spline
      - easing
      - tween
      - curve_fitter
      - logger
    editor:
      - command_history
      - editor_viewers
      - file_menu
      - ruler_tool
      - architectural_tools
      - node_graph
      - selection
    environment:
      - biome_preset
      - environment_forces
      - density_map
      - foliage_chunk
      - water_surface
    scene:
      - scene_serializer
      - entity
      - camera
      - camera_component
    scripting:
      - node_graph
      - formula_compiler
      - formula_library
      - formula_tools

# -- Which tiers to run (override with --tiers CLI flag) ----------------------
tiers: [1, 2, 3, 4, 5, 6]

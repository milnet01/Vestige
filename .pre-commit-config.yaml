# .pre-commit-config.yaml — Vestige 3D Engine
#
# Enforces the "VERSION + CHANGELOG updated in the same commit as any
# tool or engine change" rule. Without automation this is manually
# policed and easy to forget on small commits.
#
# Install (once per clone):
#   pipx install pre-commit  # or: pip install --user pre-commit
#   pre-commit install
#
# After install, every `git commit` runs these hooks; mismatched
# commits fail before the commit is created so the fix is a simple
# `git add CHANGELOG.md && git commit --amend`.
#
# Existing hooks are `repo: local` and invoke a committed shell script
# (`scripts/check_changelog_pair.sh`) — no external pre-commit hook
# repositories needed for the CHANGELOG checks, so that subset installs
# cleanly on any fork without network access to third-party hook
# sources. The gitleaks hook below pulls from its public repo (any
# contributor's first `pre-commit install` will auto-fetch it).

repos:
  - repo: local
    hooks:
      - id: audit-tool-changelog
        name: audit tool CHANGELOG + VERSION updated together
        entry: scripts/check_changelog_pair.sh
        args: ["tools/audit/", "tools/audit/CHANGELOG.md", "tools/audit/VERSION"]
        language: script
        pass_filenames: false
        always_run: true

      - id: workbench-changelog
        name: workbench CHANGELOG + VERSION updated together
        entry: scripts/check_changelog_pair.sh
        args: ["tools/formula_workbench/", "tools/formula_workbench/CHANGELOG.md", "tools/formula_workbench/VERSION"]
        language: script
        pass_filenames: false
        always_run: true

      - id: engine-changelog
        name: engine CHANGELOG + VERSION updated together
        entry: scripts/check_changelog_pair.sh
        args: ["engine/", "CHANGELOG.md", "VERSION"]
        language: script
        pass_filenames: false
        always_run: true

  # Secret-scanner. Uses the committed .gitleaks.toml allowlist (which
  # covers the rotated-and-scrubbed NVD key documented in SECURITY.md).
  # The hook runs against STAGED changes only; the full-history sweep
  # runs in CI (.github/workflows/ci.yml :: secret-scan job). Requires
  # `gitleaks` on PATH — install via:
  #   - macOS:   brew install gitleaks
  #   - Linux:   go install github.com/gitleaks/gitleaks/v8@latest
  #              or download a release binary from the project page.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

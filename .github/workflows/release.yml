# .github/workflows/release.yml — Vestige release artifact builds.
#
# Triggered by pushing a tag matching v* (e.g. v0.1.4-preview, v1.0.0) or
# by manual workflow_dispatch. Produces:
#   - Linux:   vestige-<version>-linux-x86_64.tar.gz
#   - Windows: vestige-<version>-windows-x86_64.zip
# and attaches both to a GitHub Release for the triggering tag. Testers
# (see TESTING.md) get a "download, extract, run" path without a build
# environment.
#
# This workflow is deliberately minimal for the first cut:
#   - x86_64 only. ARM64 (Linux + Windows-on-ARM) is a follow-on.
#   - No AppImage yet. Follow-on: use linuxdeploy + the existing
#     packaging/vestige-editor.desktop to produce a single-file AppImage.
#     The current Linux artifact is a relocatable tarball that assumes
#     the user has working OpenGL 4.5 drivers + X11/Wayland/ALSA on the
#     host (which is every modern desktop Linux install).
#   - Windows binary is unsigned. Code-signing needs a cert; out of
#     scope for a pre-1.0 tester build. A SmartScreen warning on first
#     run is expected and documented in TESTING.md.
#   - VESTIGE_FETCH_ASSETS=OFF matches CI — the shipped demo assets in
#     assets/ are CC0 and redistributable; VestigeAssets (the larger 4K
#     pack) stays private until v1.0.0.

name: Release

on:
  push:
    tags:
      - "v*"
  # Callable by release-cadence.yml so the weekly RC / promotion / hotfix flow
  # reuses this exact build+publish logic. workflow_call runs in the caller's
  # run with inherited permissions, so it needs NO PAT — the GITHUB_TOKEN
  # "tags pushed by a token don't trigger workflows" trap is sidestepped
  # entirely (the cadence pushes the tag, then calls this directly).
  workflow_call:
    inputs:
      tag:
        description: "Tag to build + publish (e.g. v0.1.61-rc.1 or v0.1.61). Must already exist."
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to build (e.g. v0.1.4-preview). Must already exist."
        required: true
        type: string

concurrency:
  # Serialise release runs for a given tag. A manual re-run of the same
  # tag cancels the in-flight one rather than racing for the upload.
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  # Needed for softprops/action-gh-release to create / update releases.
  # Nothing else. No `security-events`, no `id-token`.
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Linux x86_64 — tarball.
  # ─────────────────────────────────────────────────────────────────────
  linux-release:
    name: Linux x86_64 tarball
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        # No submodules in this repo (verified 2026-05-18); `submodules: recursive`
        # was wasted IO. Same drop applied to ci.yml in c768aff.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6
        with:
          # For workflow_dispatch runs, the checked-out ref is the
          # branch default (usually main); pin to the requested tag so
          # the built binary actually carries the tagged source.
          ref: ${{ inputs.tag || inputs.version || github.ref }}

      - name: Install build dependencies
        # Cached apt install — same pattern as ci.yml. Release runs are
        # rare (tag pushes) so cache benefit is smaller here than on CI,
        # but consistency + a one-line config keeps both workflows
        # uniform.
        uses: awalsh128/cache-apt-pkgs-action@553a35bb8ebd9fcabcb1c9451aa4c98e1b4ca8a9  # v1.6.1 — held; 1.6.2 breaks CI (empty_packages_behavior), see DEPENDENCY_STANDARDS.md
        with:
          # desktop-file-utils provides desktop-file-validate, which appimagetool
          # invokes to validate the bundled .desktop file (its absence fails the
          # AppImage step). patchelf is for the tarball rpath rewrite.
          packages: build-essential cmake ninja-build pkg-config libgl1-mesa-dev libglu1-mesa-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxxf86vm-dev libwayland-dev libxkbcommon-dev libasound2-dev patchelf desktop-file-utils
          version: release-linux-2

      - name: Cache CMake FetchContent deps
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v5
        with:
          path: |
            build/_deps
          key: release-cmake-deps-linux-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            release-cmake-deps-linux-

      - name: Configure (Release)
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DVESTIGE_FETCH_ASSETS=OFF

      - name: Build
        run: cmake --build build -j $(nproc)

      - name: Resolve version string
        id: version
        run: |
          # Strip refs/tags/ prefix; fall back to VERSION file for
          # manual dispatch that forgot the input.
          # Resolve the tag from whichever trigger fired: workflow_call (cadence)
          # → inputs.tag; workflow_dispatch → inputs.version; tag push → the ref.
          # VERSION file is the last-resort fallback.
          TAG="${{ inputs.tag }}"
          [ -z "$TAG" ] && TAG="${{ inputs.version }}"
          if [ -z "$TAG" ]; then
            T="${GITHUB_REF#refs/tags/}"
            [ "$T" != "$GITHUB_REF" ] && TAG="$T"
          fi
          [ -z "$TAG" ] && TAG="v$(cat VERSION)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Stage release tree
        # Build a relocatable directory:
        #   vestige-<ver>-linux-x86_64/
        #     vestige, vestige-editor           (binary + wrapper)
        #     lib/libopenal.so.1*, ...          (bundled shared libs)
        #     assets/                           (CC0 demo assets)
        #     LICENSE, README.md, TESTING.md, THIRD_PARTY_NOTICES.md, ASSET_LICENSES.md
        # rpath on vestige is set to $ORIGIN/lib so the bundled .so's
        # are found without the user touching LD_LIBRARY_PATH.
        run: |
          set -euo pipefail
          VER="${{ steps.version.outputs.version }}"
          STAGE="vestige-${VER}-linux-x86_64"
          mkdir -p "$STAGE/lib" "$STAGE/assets"

          # Engine binary and editor wrapper. Names come from
          # engine/CMakeLists.txt and packaging/vestige-editor.sh.
          cp build/bin/vestige "$STAGE/"
          cp packaging/vestige-editor.sh "$STAGE/vestige-editor"
          chmod +x "$STAGE/vestige-editor"

          # Bundle OpenAL Soft (LGPL — must be dynamically linked) and
          # any other FetchContent-built .so's that end up next to the
          # binary. GLFW and GLM are static-linked so nothing to copy.
          if [ -d build/_deps/openal-soft-build ]; then
            find build/_deps/openal-soft-build -maxdepth 3 -name 'libopenal.so*' -exec cp -av {} "$STAGE/lib/" \;
          fi
          # Repoint the binary's RUNPATH so the bundled .so is found.
          patchelf --set-rpath '$ORIGIN/lib' "$STAGE/vestige"

          # Shipped demo assets + license/notice docs.
          cp -r assets/. "$STAGE/assets/"
          cp LICENSE README.md TESTING.md THIRD_PARTY_NOTICES.md ASSET_LICENSES.md "$STAGE/"

          # Tarball it. --sort=name + --mtime for reproducibility.
          tar --sort=name --mtime='@0' --owner=0 --group=0 --numeric-owner \
              -czf "${STAGE}.tar.gz" "$STAGE"
          ls -lh "${STAGE}.tar.gz"

      - name: Build AppImage
        # Single-file, sandbox-free Linux build with embedded zsync update info,
        # so AppImageUpdate / a self-updater can pull the latest STABLE release.
        # The AppRun launcher passes --assets pointing inside the AppImage, so it
        # finds its assets from any working directory (the engine is cwd-relative).
        run: |
          set -euo pipefail
          VER="${{ steps.version.outputs.version }}"
          export APPIMAGE_EXTRACT_AND_RUN=1   # GitHub runners have no FUSE

          # Pinned packaging tools (bump deliberately, per CLAUDE.md Rule 8).
          curl -fsSL --retry 3 -o linuxdeploy \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/1-alpha-20240109-1/linuxdeploy-x86_64.AppImage
          curl -fsSL --retry 3 -o appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/1.9.0/appimagetool-x86_64.AppImage
          chmod +x linuxdeploy appimagetool

          # Assemble the AppDir: binary + bundled assets + desktop + icon + AppRun.
          APPDIR=AppDir
          rm -rf "$APPDIR"
          mkdir -p "$APPDIR/usr/bin" "$APPDIR/usr/share/vestige" \
                   "$APPDIR/usr/share/applications" \
                   "$APPDIR/usr/share/icons/hicolor/256x256/apps"
          cp build/bin/vestige "$APPDIR/usr/bin/"
          cp -r assets "$APPDIR/usr/share/vestige/assets"
          cp packaging/vestige.desktop "$APPDIR/usr/share/applications/vestige.desktop"
          cp packaging/vestige.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/vestige.png"
          cp packaging/AppRun "$APPDIR/AppRun"; chmod +x "$APPDIR/AppRun"
          cp LICENSE README.md TESTING.md THIRD_PARTY_NOTICES.md ASSET_LICENSES.md "$APPDIR/usr/share/vestige/"

          # Bundle shared-lib deps (OpenAL Soft, etc.) + patch rpath. --custom-apprun
          # keeps our launcher (which passes --assets) instead of the default.
          ./linuxdeploy --appdir "$APPDIR" \
            -d packaging/vestige.desktop \
            -i packaging/vestige.png \
            --custom-apprun packaging/AppRun

          # Package with embedded update info. The zsync glob matches the
          # versioned asset name; "latest" tracks the newest non-prerelease.
          OUT="Vestige-${VER}-x86_64.AppImage"
          ./appimagetool \
            -u "gh-releases-zsync|milnet01|Vestige|latest|Vestige-*-x86_64.AppImage.zsync" \
            "$APPDIR" "$OUT"
          ls -lh "$OUT" "${OUT}.zsync"

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: vestige-linux-x86_64
          path: |
            vestige-*-linux-x86_64.tar.gz
            Vestige-*-x86_64.AppImage
            Vestige-*-x86_64.AppImage.zsync
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(steps.version.outputs.tag, 'v')
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            vestige-*-linux-x86_64.tar.gz
            Vestige-*-x86_64.AppImage
            Vestige-*-x86_64.AppImage.zsync
          # RC tags (…-rc.N) publish immediately as pre-releases (testers);
          # final tags (vX.Y.Z) are created as DRAFTS to gate the public
          # release behind one manual "Publish" click. See release-cadence.yml.
          draft: ${{ !contains(steps.version.outputs.tag, '-rc') }}
          prerelease: ${{ contains(steps.version.outputs.tag, '-rc') }}
          fail_on_unmatched_files: true
          generate_release_notes: true

  # ─────────────────────────────────────────────────────────────────────
  # Windows x86_64 — ZIP.
  # ─────────────────────────────────────────────────────────────────────
  windows-release:
    name: Windows x86_64 zip
    runs-on: windows-2022
    timeout-minutes: 90
    steps:
      - name: Checkout
        # No submodules in this repo; same drop applied in c768aff.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6
        with:
          ref: ${{ inputs.tag || inputs.version || github.ref }}

      - name: Cache CMake FetchContent deps
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v5
        with:
          path: |
            build/_deps
          key: release-cmake-deps-windows-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            release-cmake-deps-windows-

      - name: Configure (Release)
        # Default MSVC generator on windows-2022 is VS 2022. No Ninja
        # here — the VS generator is less fussy about the first-time
        # FetchContent build on MSVC.
        run: |
          cmake -S . -B build -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DVESTIGE_FETCH_ASSETS=OFF

      - name: Build
        run: cmake --build build --config Release -j

      - name: Resolve version string
        id: version
        shell: bash
        run: |
          # Resolve the tag from whichever trigger fired: workflow_call (cadence)
          # → inputs.tag; workflow_dispatch → inputs.version; tag push → the ref.
          # VERSION file is the last-resort fallback.
          TAG="${{ inputs.tag }}"
          [ -z "$TAG" ] && TAG="${{ inputs.version }}"
          if [ -z "$TAG" ]; then
            T="${GITHUB_REF#refs/tags/}"
            [ "$T" != "$GITHUB_REF" ] && TAG="$T"
          fi
          [ -z "$TAG" ] && TAG="v$(cat VERSION)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Stage release tree
        shell: bash
        run: |
          set -euo pipefail
          VER="${{ steps.version.outputs.version }}"
          STAGE="vestige-${VER}-windows-x86_64"
          mkdir -p "$STAGE/assets"

          # MSVC multi-config generator writes Release output to
          # build/bin/Release/ (or build/Release/ depending on version);
          # find the exe and copy it + any sibling DLLs.
          EXE="$(find build -maxdepth 4 -iname 'vestige.exe' | head -1)"
          test -n "$EXE"
          EXE_DIR="$(dirname "$EXE")"
          cp "$EXE" "$STAGE/"
          # Copy every DLL that ended up next to the .exe (OpenAL Soft,
          # anything else that built SHARED). CMake/MSBuild puts them
          # there when the target lists them as runtime deps.
          find "$EXE_DIR" -maxdepth 1 -iname '*.dll' -exec cp -v {} "$STAGE/" \;

          # Shipped assets + license docs.
          cp -r assets/. "$STAGE/assets/"
          cp LICENSE README.md TESTING.md THIRD_PARTY_NOTICES.md ASSET_LICENSES.md "$STAGE/"

          # Windows testers double-click the .exe, but a tiny .cmd
          # wrapper helps when they want an obvious "launch" entry.
          cat > "$STAGE/vestige-editor.cmd" <<'EOF'
          @echo off
          "%~dp0vestige.exe" %*
          EOF

          # Use PowerShell's Compress-Archive via cmd so we get a real
          # zip with Windows-friendly path separators.
          powershell -NoProfile -Command "Compress-Archive -Path '$STAGE' -DestinationPath '${STAGE}.zip' -Force"
          ls -lh "${STAGE}.zip"

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: vestige-windows-x86_64
          path: vestige-*-windows-x86_64.zip
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(steps.version.outputs.tag, 'v')
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: vestige-*-windows-x86_64.zip
          # RC tags publish as pre-releases; final tags are gated drafts.
          # See the linux-release attach step + release-cadence.yml.
          draft: ${{ !contains(steps.version.outputs.tag, '-rc') }}
          prerelease: ${{ contains(steps.version.outputs.tag, '-rc') }}
          fail_on_unmatched_files: true
          generate_release_notes: true

# .github/workflows/ci.yml — Vestige 3D Engine CI
#
# Linux Debug and Release builds, run ctest, then run the repo's own
# audit tool at Tier 1 so every PR stays clean against the same static
# checks contributors use locally.
#
# CI intentionally does NOT run Tier 5 (CVE research) — that needs the
# NVD API key (NVD_API_KEY env var) and would leak warnings about
# missing env state on PRs from forks (where the secret isn't
# available). Local developers and release builds run Tier 5.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-build-test:
    name: Linux ${{ matrix.config }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        config: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxxf86vm-dev \
            libwayland-dev \
            libxkbcommon-dev \
            xvfb \
            python3 \
            python3-pip \
            python3-xmltodict \
            python3-yaml \
            python3-flask \
            cppcheck

      - name: Cache CMake FetchContent deps
        uses: actions/cache@v5
        with:
          path: |
            build/_deps
          key: cmake-deps-${{ matrix.config }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            cmake-deps-${{ matrix.config }}-

      - name: Configure
        # -DVESTIGE_FETCH_ASSETS=OFF matches the engine default while the
        # milnet01/VestigeAssets sibling repo is still private. Passed
        # explicitly in CI so the intent is clear when reading the
        # workflow: we're testing the default fresh-public-clone build
        # path, not an opt-in maintainer build with authenticated access
        # to the private asset repo. Flip to ON when VestigeAssets goes
        # public (targeted for ~v1.0.0 after the final redistributability
        # audit — see external/CMakeLists.txt and ASSET_LICENSES.md).
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.config }} \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DVESTIGE_FETCH_ASSETS=OFF

      - name: Build
        run: cmake --build build -j $(nproc)

      - name: Run tests
        run: |
          # xvfb-run provides a virtual X display so tests that incidentally
          # touch GLFW/GL don't fail in the headless runner.
          xvfb-run --auto-servernum ctest --test-dir build --output-on-failure -j $(nproc)

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-logs-${{ matrix.config }}
          path: |
            build/Testing/**/*.log
            build/Testing/**/*.xml
          if-no-files-found: ignore

  audit-tool-tier1:
    name: Audit tool Tier 1 (static)
    runs-on: ubuntu-24.04
    # 45-min ceiling matches linux-build-test. Rationale: this job does the
    # full Debug build (~12 min cold on GH free runners) + cppcheck (~1.5 min)
    # + clang-tidy on 50 files across 5 heavy check categories (bugprone-*,
    # performance-*, modernize-*, readability-*, cppcoreguidelines-*, ~8-10
    # min). Cold-start worst case ~22 min; warm runs (build/_deps cached) are
    # faster. The previous 20-min ceiling was cutting clang-tidy mid-run.
    # See milnet01/Vestige CI run 24391001628 for the data.
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install audit tool dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cppcheck \
            clang-tidy \
            python3 \
            python3-pip \
            python3-xmltodict \
            python3-yaml \
            python3-flask \
            build-essential \
            cmake \
            ninja-build \
            xvfb \
            libgl1-mesa-dev libglu1-mesa-dev \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libxxf86vm-dev libwayland-dev libxkbcommon-dev

      - name: Cache CMake FetchContent deps
        uses: actions/cache@v5
        with:
          path: |
            build/_deps
          key: cmake-deps-Debug-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            cmake-deps-Debug-

      - name: Configure (for compile_commands.json)
        # -DVESTIGE_FETCH_ASSETS=OFF: see the comment on the Configure
        # step in linux-build-test above. Flips to ON in lockstep with
        # VestigeAssets going public (targeted for ~v1.0.0).
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DVESTIGE_FETCH_ASSETS=OFF

      - name: Build
        # Tier 1 invokes `cmake --build build` internally (audit_config.yaml
        # build.build_cmd) to detect compiler warnings. Without this step the
        # audit does a cold build from scratch inside its own 300 s subprocess
        # timeout and reports Build: FAILED even when the build would succeed.
        # Running the build here as a native CI step — no internal timeout —
        # means audit.py's subsequent `cmake --build` is a warm no-op and the
        # test binary exists so Tier 1's test step sees all 1768 tests.
        run: cmake --build build -j $(nproc)

      - name: Run audit Tier 1
        # --ci: emit ::error/::warning annotations per finding + write
        # step summary to $GITHUB_STEP_SUMMARY. Exit code encodes
        # finding severity (0 = clean, 1 = HIGH, 2 = CRITICAL).
        # --no-color: propagate NO_COLOR=1 to cppcheck/clang-tidy/git
        # children so downloaded log artifacts stay free of ANSI escapes.
        # xvfb-run: GLFW-backed tests (e.g. test_timer.cpp calling
        # glfwInit in SetUp) need an X display. Without this the Timer
        # tests fail because glfwGetTime returns uninitialised state.
        # Matches how linux-build-test wraps its ctest invocation.
        # Follow-up: Timer should use std::chrono::steady_clock so the
        # test doesn't need a display at all.
        run: |
          xvfb-run --auto-servernum python3 tools/audit/audit.py -t 1 --ci --no-color || {
            echo "::error::Tier 1 audit failed — see annotations above."
            exit 1
          }

      - name: Upload audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-tier1-report
          path: |
            docs/AUTOMATED_AUDIT_REPORT.md
            docs/AUTOMATED_AUDIT_REPORT_*.md
            docs/AUTOMATED_AUDIT_REPORT_*.json
          if-no-files-found: ignore

  # CMake compatibility matrix. The main linux-build-test job runs against
  # whatever cmake ships with ubuntu-24.04 (currently 3.28.x). This separate
  # compat job exercises the engine's declared minimum (3.20) and the latest
  # upstream release on each push/PR, so downstream users on either edge see
  # regressions surface in a PR check rather than a bug report. Release-only,
  # build-and-test (no audit), to keep the cost bounded. PRE_OPEN_SOURCE_AUDIT.md
  # §8 follow-up: the engine's external/CMakeLists.txt SOURCE_SUBDIR pattern
  # depends on FetchContent semantics that have tightened before (CMP0169).
  cmake-compat:
    name: CMake ${{ matrix.cmake }} (Release)
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        cmake: ["3.20.6", "latest"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ninja-build \
            pkg-config \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxxf86vm-dev \
            libwayland-dev \
            libxkbcommon-dev \
            xvfb

      - name: Install CMake ${{ matrix.cmake }}
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: ${{ matrix.cmake }}

      - name: Verify CMake version
        run: cmake --version

      - name: Cache CMake FetchContent deps
        uses: actions/cache@v5
        with:
          path: |
            build/_deps
          key: cmake-deps-compat-${{ matrix.cmake }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            cmake-deps-compat-${{ matrix.cmake }}-

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DVESTIGE_FETCH_ASSETS=OFF

      - name: Build
        run: cmake --build build -j $(nproc)

      - name: Run tests
        run: |
          xvfb-run --auto-servernum ctest --test-dir build --output-on-failure -j $(nproc)

  # Secret-scanning job — runs gitleaks against the repo and the full
  # git history every push and PR. Catches accidentally-committed
  # credentials before they reach public mirrors / caches. Uses the
  # committed .gitleaks.toml so the allowlist stays in lockstep with
  # the local pre-commit config. Non-blocking on forks (secret_scan is
  # a separate job, so a fork's PR can still land the rest of CI if
  # this job hits a transient download failure).
  secret-scan:
    name: gitleaks
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Uses the committed .gitleaks.toml config (allowlist for the
          # rotated-and-scrubbed NVD key, documented in SECURITY.md).
          GITLEAKS_CONFIG: .gitleaks.toml
          # GITLEAKS_LICENSE only needed for organisation-level commercial
          # use; the open-source action is free for public repos.

# .github/workflows/ci.yml — Vestige 3D Engine CI
#
# AUDIT.md §M25 / FIXPLAN I1: first CI for the project. Linux Debug
# and Release builds, run ctest, then run the repo's own audit tool
# at Tier 1 so every PR stays clean against the same static checks we
# use locally.
#
# CI intentionally does NOT run Tier 5 (CVE research) — that needs the
# NVD API key and would leak warnings about missing env state on forks.
# Local developers and release builds still do Tier 5.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-build-test:
    name: Linux ${{ matrix.config }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        config: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxxf86vm-dev \
            libwayland-dev \
            libxkbcommon-dev \
            xvfb \
            python3 \
            python3-pip \
            python3-xmltodict \
            python3-yaml \
            python3-flask \
            cppcheck

      - name: Cache CMake FetchContent deps
        uses: actions/cache@v4
        with:
          path: |
            build/_deps
          key: cmake-deps-${{ matrix.config }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            cmake-deps-${{ matrix.config }}-

      - name: Configure
        # -DVESTIGE_FETCH_ASSETS=OFF: during open-source launch prep the
        # milnet01/VestigeAssets sibling repo (large CC0 asset pack
        # pulled via FetchContent) is still private, so an unauthenticated
        # GitHub Actions clone fails with
        #   `fatal: could not read Username for 'https://github.com'`.
        # The engine supports the off-state out of the box (top-level
        # CMakeLists.txt falls back to in-engine assets only), which is
        # sufficient for build + ctest coverage. **Remove this flag**
        # once both repos go public together — see PRE_OPEN_SOURCE_AUDIT.md §11.
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.config }} \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DVESTIGE_FETCH_ASSETS=OFF

      - name: Build
        run: cmake --build build -j $(nproc)

      - name: Run tests
        run: |
          # xvfb-run provides a virtual X display so tests that incidentally
          # touch GLFW/GL don't fail in the headless runner.
          xvfb-run --auto-servernum ctest --test-dir build --output-on-failure -j $(nproc)

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-logs-${{ matrix.config }}
          path: |
            build/Testing/**/*.log
            build/Testing/**/*.xml
          if-no-files-found: ignore

  audit-tool-tier1:
    name: Audit tool Tier 1 (static)
    runs-on: ubuntu-24.04
    # 45-min ceiling matches linux-build-test. Rationale: this job does the
    # full Debug build (~12 min cold on GH free runners) + cppcheck (~1.5 min)
    # + clang-tidy on 50 files across 5 heavy check categories (bugprone-*,
    # performance-*, modernize-*, readability-*, cppcoreguidelines-*, ~8-10
    # min). Cold-start worst case ~22 min; warm runs (build/_deps cached) are
    # faster. The previous 20-min ceiling was cutting clang-tidy mid-run.
    # See milnet01/Vestige CI run 24391001628 for the data.
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install audit tool dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cppcheck \
            clang-tidy \
            python3 \
            python3-pip \
            python3-xmltodict \
            python3-yaml \
            python3-flask \
            build-essential \
            cmake \
            ninja-build \
            xvfb \
            libgl1-mesa-dev libglu1-mesa-dev \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libxxf86vm-dev libwayland-dev libxkbcommon-dev

      - name: Cache CMake FetchContent deps
        uses: actions/cache@v4
        with:
          path: |
            build/_deps
          key: cmake-deps-Debug-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            cmake-deps-Debug-

      - name: Configure (for compile_commands.json)
        # -DVESTIGE_FETCH_ASSETS=OFF: see the comment on the Configure
        # step in linux-build-test above. Must be removed in lockstep
        # with VestigeAssets going public at launch.
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DVESTIGE_FETCH_ASSETS=OFF

      - name: Build
        # Tier 1 invokes `cmake --build build` internally (audit_config.yaml
        # build.build_cmd) to detect compiler warnings. Without this step the
        # audit does a cold build from scratch inside its own 300 s subprocess
        # timeout and reports Build: FAILED even when the build would succeed.
        # Running the build here as a native CI step — no internal timeout —
        # means audit.py's subsequent `cmake --build` is a warm no-op and the
        # test binary exists so Tier 1's test step sees all 1768 tests.
        run: cmake --build build -j $(nproc)

      - name: Run audit Tier 1
        # --ci: emit ::error/::warning annotations per finding + write
        # step summary to $GITHUB_STEP_SUMMARY. Exit code encodes finding
        # severity (0 = clean, 1 = HIGH, 2 = CRITICAL) per AUDIT.md §M25
        # and FIXPLAN I1's original design.
        # --no-color: propagate NO_COLOR=1 to cppcheck/clang-tidy/git
        # children so downloaded log artifacts stay free of ANSI escapes.
        # xvfb-run: GLFW-backed tests (e.g. test_timer.cpp calling
        # glfwInit in SetUp) need an X display. Without this the Timer
        # tests fail because glfwGetTime returns uninitialised state.
        # Matches how linux-build-test wraps its ctest invocation.
        # Follow-up: Timer should use std::chrono::steady_clock so the
        # test doesn't need a display at all.
        run: |
          xvfb-run --auto-servernum python3 tools/audit/audit.py -t 1 --ci --no-color || {
            echo "::error::Tier 1 audit failed — see annotations above."
            exit 1
          }

      - name: Upload audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-tier1-report
          path: |
            docs/AUTOMATED_AUDIT_REPORT.md
            docs/AUTOMATED_AUDIT_REPORT_*.md
            docs/AUTOMATED_AUDIT_REPORT_*.json
          if-no-files-found: ignore
